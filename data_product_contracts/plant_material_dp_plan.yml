contract:
  name: material_plant_data_quality_contract
  version: "1.0.0"
  description: "Data quality contract for SAP bronze tables used by material plant data product"
  owner: data-product-team

runtime:
  parameters:
    client: "100"
    cutoff_date: "2025-10-01"

sources:
  - name: marc
    table: workspace.sap_bronze.marc
    checks:
      - type: table_exists
      - type: row_count_min
        min: 1
      - type: required_columns
        columns:
          - MANDT
          - MATNR
          - WERKS
          - LVORM
          - DISPO
          - BESKZ
          - EKGRP
          - SHFLG
          - SHZET
          - DZEIT
          - KORDB
          - EISLO
          - DISLS
          - DISMM
          - WEBAZ
          - EISBE
          - MTVFP
          - FEVOR
          - PLIFZ
          - PRCTR
          - MAABC
      - type: not_null
        columns:
          - MANDT
          - MATNR
          - WERKS
      - type: accepted_values
        column: MANDT
        values: ["${client}"]
      - type: type_castable
        columns:
          - SHZET
          - EISLO
          - DISLS
          - WEBAZ
          - EISBE
          - PLIFZ
        target_type: double

  - name: mara
    table: workspace.sap_bronze.mara
    checks:
      - type: table_exists
      - type: row_count_min
        min: 1
      - type: required_columns
        columns:
          - MANDT
          - MATNR
          - MTART
      - type: not_null
        columns:
          - MANDT
          - MATNR
          - MTART
      - type: accepted_values
        column: MANDT
        values: ["${client}"]

  - name: ekpo
    table: workspace.sap_bronze.ekpo
    checks:
      - type: table_exists
      - type: required_columns
        columns:
          - MATNR
          - AEDAT
      - type: type_castable
        columns:
          - AEDAT
        target_type: date
      - type: freshness
        column: AEDAT
        cutoff_date: "${cutoff_date}"
        severity: warning

  - name: vbap
    table: workspace.sap_bronze.vbap
    checks:
      - type: table_exists
      - type: required_columns
        columns:
          - MATNR
          - ERDAT
      - type: type_castable
        columns:
          - ERDAT
        target_type: date
      - type: freshness
        column: ERDAT
        cutoff_date: "${cutoff_date}"
        severity: warning

  - name: dq_rules_master
    table: workspace.default.dq_rules_master
    checks:
      - type: table_exists
      - type: row_count_min
        min: 1
      - type: required_columns
        columns:
          - RULE_NAME
          - FUNCTION
          - TYPE
      - type: not_null
        columns:
          - RULE_NAME
          - FUNCTION
          - TYPE
      - type: accepted_values
        column: RULE_NAME
        values:
          - MRP_CONTROLLER_COMPLETENESS_CHECK
          - PURCHASE_GROUP_COMPLETENESS_CHECK
          - SAFETY_TIME_COMPLETENESS_CHECK
          - INHOUSE_PRODUCTION_LEADTIME_COMPLETENESS_CHECK
          - SOURCE_LIST_REQUIREMENT_COMPLETENESS_CHECK
          - MIN_SAFETY_STOCK_COMPLETENESS_CHECK
          - LOT_SIZE_COMPLETENESS_CHECK
          - MRP_TYPE_COMPLETENESS_CHECK
          - GR_PROCESSTIME_COMPLETENESS_CHECK
          - SAFETY_STOCK_COMPLETENESS_CHECK
          - ATP_COMPLETENESS_CHECK
          - INHOUSE_PRODUCTION_SCHEDULER_COMPLETENESS_CHECK
          - DELIVERY_LEADTIME_COMPLETENESS_CHECK
          - PROFIT_CENTER_COMPLETENESS_CHECK
          - ABC_COMPLETENESS_CHECK
          - PROCUREMENT_MATERIAL_STALENESS_CHECK
          - SALES_MATERIAL_STALENESS_CHECK

cross_source_checks:
  - name: marc_mara_join_coverage
    type: referential_integrity
    left_table: workspace.sap_bronze.marc
    right_table: workspace.sap_bronze.mara
    join_columns:
      - MANDT
      - MATNR
    left_filter: "MANDT = '${client}' AND LVORM IS NULL"
    max_orphan_count: 0
    severity: error
