dataContractSpecification: "1.1.0"

id: "plant-material-data-quality-source-contract"
name: "Plant Material Data Quality Source Contract"
version: "1.0.0"
status: "active"

description: >
  Pre-transformation data contract for the Plant Material Data Quality data product.
  This contract validates that all source tables and fields required by the transformation
  SQL exist and conform to expected format rules before transformation logic is executed.

owner:
  name: "Data Excellence Practice EMEA"
  role: "Data Product Owner"

execution:
  validationStage: "pre-transformation"
  failureAction: "stop_pipeline"
  successAction: "run_transformation"
  targetDataProduct: "default.MATERIAL_PLANT_DATA_QUALITY_CHECK"

servers:
  source:
    type: "databricks"
    environment: "production"
    catalog: "workspace"
    schemas:
      - "sap_bronze"
      - "default"

dataProduct:
  name: "Plant Material Data Quality Check"
  targetTable: "default.MATERIAL_PLANT_DATA_QUALITY_CHECK"
  sourceSystem: "SAP"
  domain: "Material Master Data"
  subjectArea: "Plant Material Data Quality"

models:

  marc:
    description: "SAP Material Master - Plant Data"
    type: "table"
    physicalName: "workspace.sap_bronze.marc"
    required: true

    fields:

      mandt:
        sourceField: "MANDT"
        description: "SAP Client"
        required: true
        nullable: false
        type: "string"
        format:
          length: 3
          regex: "^[0-9]{3}$"

      werks:
        sourceField: "WERKS"
        description: "Plant"
        required: true
        nullable: false
        type: "string"
        format:
          maxLength: 4
          regex: "^[A-Z0-9]{1,4}$"

      matnr:
        sourceField: "MATNR"
        description: "Material Number"
        required: true
        nullable: false
        type: "string"
        format:
          maxLength: 40
          regex: "^[A-Z0-9_\\-]+$"

      dispo:
        sourceField: "DISPO"
        description: "MRP Controller"
        required: true
        nullable: true
        type: "string"
        format:
          maxLength: 3

      beskz:
        sourceField: "BESKZ"
        description: "Procurement Type"
        required: true
        nullable: true
        type: "string"
        severity: "warning"
        format:
          maxLength: 1
        allowedValues:
          - "E"
          - "F"
          - "X"

      ekgrp:
        sourceField: "EKGRP"
        description: "Purchasing Group"
        required: true
        nullable: true
        type: "string"
        format:
          maxLength: 3

      shflg:
        sourceField: "SHFLG"
        description: "Safety Time Indicator"
        required: true
        nullable: true
        type: "string"
        format:
          maxLength: 1

      shzet:
        sourceField: "SHZET"
        description: "Safety Time"
        required: true
        nullable: true
        type: "numeric_string"
        format:
          castableTo: "double"

      dzeit:
        sourceField: "DZEIT"
        description: "In-house Production Time"
        required: true
        nullable: true
        type: "numeric_string"
        format:
          castableTo: "double"

      kordb:
        sourceField: "KORDB"
        description: "Source List Requirement Indicator"
        required: true
        nullable: true
        type: "string"
        severity: "warning"
        format:
          maxLength: 1
        allowedValues:
          - "X"

      eislo:
        sourceField: "EISLO"
        description: "Minimum Safety Stock"
        required: true
        nullable: true
        type: "numeric_string"
        format:
          castableTo: "double"

      disls:
        sourceField: "DISLS"
        description: "Lot Sizing Procedure"
        required: true
        nullable: true
        type: "string"
        format:
          maxLength: 2

      dismm:
        sourceField: "DISMM"
        description: "MRP Type"
        required: true
        nullable: true
        type: "string"
        format:
          maxLength: 2

      webaz:
        sourceField: "WEBAZ"
        description: "Goods Receipt Processing Time"
        required: true
        nullable: true
        type: "numeric_string"
        format:
          castableTo: "double"

      eisbe:
        sourceField: "EISBE"
        description: "Safety Stock"
        required: true
        nullable: true
        type: "numeric_string"
        format:
          castableTo: "double"

      mtvfp:
        sourceField: "MTVFP"
        description: "Checking Group for Availability Check"
        required: true
        nullable: true
        type: "string"
        format:
          maxLength: 2

      fevor:
        sourceField: "FEVOR"
        description: "Production Scheduler"
        required: true
        nullable: true
        type: "string"
        format:
          maxLength: 3

      plifz:
        sourceField: "PLIFZ"
        description: "Planned Delivery Time"
        required: true
        nullable: true
        type: "numeric_string"
        format:
          castableTo: "double"

      prctr:
        sourceField: "PRCTR"
        description: "Profit Center"
        required: true
        nullable: true
        type: "string"
        format:
          maxLength: 10

      maabc:
        sourceField: "MAABC"
        description: "ABC Indicator"
        required: true
        nullable: true
        type: "string"
        format:
          maxLength: 1

      lvorm:
        sourceField: "LVORM"
        description: "Deletion Indicator"
        required: true
        nullable: true
        type: "string"
        severity: "warning"
        format:
          maxLength: 1
        allowedValues:
          - "X"

  mara:
    description: "SAP Material Master - General Material Data"
    type: "table"
    physicalName: "workspace.sap_bronze.mara"
    required: true

    fields:

      mandt:
        sourceField: "MANDT"
        description: "SAP Client"
        required: true
        nullable: false
        type: "string"
        format:
          length: 3
          regex: "^[0-9]{3}$"

      matnr:
        sourceField: "MATNR"
        description: "Material Number"
        required: true
        nullable: false
        type: "string"
        format:
          maxLength: 40
          regex: "^[A-Z0-9_\\-]+$"

      mtart:
        sourceField: "MTART"
        description: "Material Type"
        required: true
        nullable: true
        type: "string"
        format:
          maxLength: 4
        expectedValuesUsedInLogic:
          - "FERT"
          - "HALB"
          - "HAWA"

  ekpo:
    description: "SAP Purchasing Document Item"
    type: "table"
    physicalName: "workspace.sap_bronze.ekpo"
    required: true

    fields:

      matnr:
        sourceField: "MATNR"
        description: "Material Number"
        required: true
        nullable: true
        type: "string"
        format:
          maxLength: 40
          regex: "^[A-Z0-9_\\-]+$"

      aedat:
        sourceField: "AEDAT"
        description: "Purchasing Document Date"
        required: true
        nullable: true
        type: "date_string"
        format:
          castableTo: "date"

  vbap:
    description: "SAP Sales Document Item"
    type: "table"
    physicalName: "workspace.sap_bronze.vbap"
    required: true

    fields:

      matnr:
        sourceField: "MATNR"
        description: "Material Number"
        required: true
        nullable: true
        type: "string"
        format:
          maxLength: 40
          regex: "^[A-Z0-9_\\-]+$"

      erdat:
        sourceField: "ERDAT"
        description: "Sales Document Creation Date"
        required: true
        nullable: true
        type: "date_string"
        format:
          castableTo: "date"

  dq_rules_master:
    description: "Data Quality Rules Master"
    type: "table"
    physicalName: "workspace.default.dq_rules_master"
    required: true

    fields:

      rule_name:
        sourceField: "RULE_NAME"
